name: Build macOS

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Build channel
        required: true
        default: canary
        type: choice
        options:
          - canary
          - stable

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache vendor binaries and model
        uses: actions/cache@v4
        with:
          path: vendors/
          key: macos-vendors-${{ hashFiles('scripts/pre-build.ts') }}

      - name: Pre-build (download and compile vendor binaries)
        run: bun run scripts/pre-build.ts

      - name: Install Apple certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Clean up any existing keychain from a previous run
          security delete-keychain build.keychain || true

          # Decode and import certificate into a fresh keychain
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain

          # Add to search list while preserving existing keychains
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain

          # Import with codesign and productbuild access so they never prompt
          security import certificate.p12 -k build.keychain -P $MACOS_CERTIFICATE_PWD -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain

          # Keep keychain unlocked for the entire job
          security set-keychain-settings -lut 21600 build.keychain

          # Verify the identity is visible
          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain

          rm certificate.p12

      - name: Build (${{ inputs.channel }})
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID || '' }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID || '' }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID || '' }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS || '' }}
        run: |
          echo "::add-mask::$ELECTROBUN_DEVELOPER_ID"
          echo "::add-mask::$ELECTROBUN_APPLEID"
          echo "::add-mask::$ELECTROBUN_APPLEIDPASS"
          echo "::add-mask::$ELECTROBUN_TEAMID"
          bun run build:${{ inputs.channel }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ inputs.channel }}
          path: artifacts/${{ inputs.channel }}-*
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
